<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Promotion Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; border-radius: 5px; width: 80%; max-width: 600px; }
        #response { white-space: pre-wrap; background: #eee; padding: 10px; border-radius: 5px; width: 80%; max-width: 600px; max-height: 200px; overflow-y: auto; }
        .token-box { word-break: break-all; font-size: 0.8em; color: green; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Google OAuth2 - Guest Link/Promotion</h1>
    
    <div class="section">
        <h3>Step 1: Get Guest Token</h3>
        <button onclick="loginAsGuest()">Login as Guest</button>
        <div id="guestToken" class="token-box">No token yet...</div>
    </div>

    <div class="section">
        <h3>Step 2: Link Google to Guest</h3>
        <p>This page tests <code>POST /api/v1/external-auth/link/google</code></p>
        <div id="g_id_onload"
             data-client_id="850603926479-jekh2ah3spjm57h2beeiba68371j5ghv.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="response">Response will appear here...</div>

    <script>
        let currentAccessToken = null;

        async function loginAsGuest() {
            document.getElementById('guestToken').innerText = 'Logging in...';
            try {
                const res = await fetch('https://localhost/api/v1/internal-auth/login/guest', {
                    method: 'POST',
                    headers: { 'Idempotency-Key': crypto.randomUUID() }
                });
                const data = await res.json();
                if (data.success) {
                    currentAccessToken = data.data.accessToken;
                    document.getElementById('guestToken').innerText = 'Access Token: ' + currentAccessToken;
                } else {
                    document.getElementById('guestToken').innerText = 'Failed: ' + data.message;
                }
            } catch (err) {
                document.getElementById('guestToken').innerText = 'Error: ' + err.message;
            }
        }

        async function handleCredentialResponse(response) {
            if (!currentAccessToken) {
                alert('Please login as a guest first!');
                return;
            }

            document.getElementById('response').innerText = 'Linking Google account...';

            try {
                const res = await fetch('https://localhost/api/v1/external-auth/link/google', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentAccessToken
                    },
                    body: JSON.stringify({ idToken: response.credential })
                });
                const data = await res.json();
                document.getElementById('response').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('response').innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
