<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Google Login Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        #response { white-space: pre-wrap; background: #eee; padding: 10px; border-radius: 5px; width: 80%; max-width: 600px; }
    </style>
</head>
<body>
    <h1>Google OAuth2 - Normal Login</h1>
    <p>This page tests <code>POST /api/v1/external-auth/login/google</code></p>
    
    <div id="g_id_onload"
         data-client_id="850603926479-jekh2ah3spjm57h2beeiba68371j5ghv.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <div id="response">Response will appear here...</div>

    <script>
        async function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            document.getElementById('response').innerText = 'Sending to backend...';

            try {
                const res = await fetch('https://localhost/api/v1/external-auth/login/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: response.credential })
                });
                const data = await res.json();
                document.getElementById('response').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('response').innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
