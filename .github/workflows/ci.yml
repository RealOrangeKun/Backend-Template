name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, 'feature/*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # We don't necessarily need services here because Testcontainers 
      # will spin them up inside the Docker daemon on the runner.
      # However, the runner must have Docker installed (ubuntu-latest does).

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      # Testcontainers requires access to the Docker daemon.
      # On GitHub-hosted runners (ubuntu-latest), the user has permission.
      run: dotnet test --no-build --configuration Release --verbosity normal
