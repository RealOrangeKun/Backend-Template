worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 1. Hide Nginx Version
    # Turns "Server: nginx/1.18.0" into just "Server: nginx"
    server_tokens off;

    # Force UTF-8 for all text content types
    charset utf-8;

    # Rate Limiting
    # Zone 1: General API Protection (DDoS)
    # Allows 10 requests per second per IP. Good for normal browsing.
    # 10m memory stores ~160,000 IPs.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Zone 2: Strict Login Protection (Brute Force)
    # Allows only 1 request per second per IP.
    # Use this for /login or /register endpoints.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;

    # setting the status code for rate limiting to 429 Too Many Requests
    limit_req_status 429;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Cache Configuration
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Upstream API
    upstream backend_api {
        server api:8080;
    }

    # Map for WebSocket connection header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP to HTTPS Redirection
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server (SSL Terminator & Gateway)
    server {
        listen 443 ssl;
        server_name localhost;

        # Certificates
        ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # The below steps from 1 to 4 are done to prevent man in the middle attacks and to ensure secure communication between clients and the API.
        # specifically a type of Man-in-the-Middle (MitM) attack called a Downgrade Attack. 
        # 1. Enforce only secure protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # 2. The "Mozilla Intermediate" Cipher Suite
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # 3. Optimization: Let the client (phone/browser) pick the cipher. 
        # This saves battery on mobile devices by allowing them to choose ChaCha20.
        ssl_prefer_server_ciphers off;

        # 4. Session Caching (Kept from your original config, moved here for clarity)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # default-src should be 'none` and then we can allow specific sources for scripts, styles, images, etc. This is a more secure approach.
        add_header Content-Security-Policy "default-src 'self' https: data: blob: frame-ancestors 'none';" always;

        # HSTS (HTTP Strict Transport Security) - Enforce HTTPS for future requests
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 2. Hide Backend Framework Fingerprints
        # Explicitly strips these headers from the response before sending to user
        proxy_hide_header X-Powered-By;
        proxy_hide_header X-AspNet-Version;

        # Strict rate limiting for authentication endpoints
        location ~* /api/v[0-9]+/(internal|external)-auth/login|/api/v[0-9]+/internal-auth/register {
            limit_req zone=login_limit burst=5 nodelay;
            
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Authentication should never be cached
            proxy_cache off;
        }

        # Serve test OAuth pages
        location /test_oauth/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ =404;
        }

        
        location / {
            # Application of the general API rate limit
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy Settings
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;

            # Bypass cache for WebSockets and authenticated requests
            proxy_cache_bypass $http_upgrade;
            proxy_cache_bypass $cookie_refreshToken;
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $cookie_refreshToken;
            proxy_no_cache $http_authorization;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache Logic
            proxy_cache api_cache;
            proxy_cache_valid 200 10m; # Cache successful GETs for 10 minutes
            proxy_cache_methods GET;   # Only cache GET requests
            proxy_cache_key "$scheme$request_method$host$request_uri";
            
            # Allow users to see if the response was cached
            add_header X-Cache-Status $upstream_cache_status always;

            # Buffering for performance
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # turning off directory listing for security
            autoindex off;
        }
    }
}
